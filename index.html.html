<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matemáticas 3ºA — ¡Héroes del Número!</title>
<style>
 @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap');
  :root {
    --marvel-red: #E23636;
    --marvel-gold: #F5C518;
    --marvel-blue: #003FA3;
    --space-dark: #0A0A1A;
    --space-mid: #12122A;
    --star-white: #F0F4FF;
    --neon-yellow: #FFE600;
    --neon-cyan: #00E5FF;
    --card-bg: #1A1A35;
    --text-light: #E8EEFF;
    --text-muted: #9AA3CC;
    --sky-dark:   #0277BD;
    --shadow-sm:  0 2px 8px rgba(0,0,0,0.10);
    --shadow-md:  0 6px 20px rgba(0,0,0,0.13);
    --shadow-lg:  0 12px 36px rgba(0,0,0,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--space-dark);
    background-image: url('https://espadasymas.com/cdn/shop/articles/imagen_2025-11-27_033238407_7d846772-5c53-445a-b0ed-fae1642debbb.png?v=1764226018');
    background-size: cover;
    background-attachment: fixed;
    color: var(--text-light);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, #fff 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 5%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 60%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 20%, #fff 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 80% 75%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 35%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 80%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 90%, #fff 0%, transparent 100%),
      radial-gradient(2px 2px at 35% 55%, rgba(100,149,237,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 10%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 50%, #fff 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 95% 85%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 48% 30%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 73% 55%, rgba(255,230,0,0.6) 0%, transparent 100%);
    pointer-events: none;
  }

  /* ─── HEADER ─── */
  header {
    position: relative; z-index: 10;
    background: linear-gradient(135deg,#7ED6FF 0%,#80ED99 55%,#FFE66D 100%);
    border-bottom: 4px solid var(--marvel-red);
    padding: 0;
    overflow: hidden;
  }
  header::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--marvel-red), var(--marvel-gold), var(--marvel-red));
    animation: shimmer 3s linear infinite;
    background-size: 200% 100%;
  }
  @keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }

  .header-inner {
    max-width: 1100px; margin: 0 auto;
    padding: 28px 24px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .header-badge {
    background: var(--marvel-red);
    color: #fff; font-family: 'Bangers', cursive; font-size: 1.05rem;
    letter-spacing: 3px; padding: 5px 22px; border-radius: 20px;
    text-transform: uppercase;
  }
  header h1 {
    font-family: 'Fredoka', sans-serif;
    font-size: clamp(2.4rem, 6vw, 4.2rem);
    color: var(--neon-yellow);
    text-shadow: 4px 4px 0 var(--marvel-red), 0 0 30px rgba(245,197,24,0.5);
    letter-spacing: 4px; text-align: center; line-height: 1.1;
  }
  header p {
    color: var(--text-muted); font-size: 1rem; font-weight: 700;
    letter-spacing: 1px;
  }
  .hero-icons-row {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 6px;
  }
  .hero-mini { font-size: 2rem;  cursor: default; }
  .hero-mini:nth-child(2) { animation-delay: 0.3s; }
  .hero-mini:nth-child(3) { animation-delay: 0.6s; }
  .hero-mini:nth-child(4) { animation-delay: 0.9s; }
  .hero-mini:nth-child(5) { animation-delay: 1.2s; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

  /* ─── NAV ─── */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(126,214,255,0.95);
    backdrop-filter: blur(8px);
    border-bottom: 2px solid var(--marvel-blue);
    padding: 10px 16px;
    display: flex; justify-content: center;
  }
  .nav-btn {
 display:block;
 margin:0 auto;

    background: var(--marvel-blue); border: none; color: #fff;
    font-family: 'Bangers', cursive; font-size: 1.1rem; letter-spacing: 2px;
    padding: 10px 28px; border-radius: 30px; cursor: pointer;
    transition: all 0.2s; box-shadow: 0 4px 12px rgba(0,63,163,0.5);
  }
  .nav-btn:hover { background: var(--marvel-blue); transform: none; }

  /* ─── MAIN WRAPPER ─── */
  main { position: relative; z-index: 5; }

  /* ─── HOME ─── */
  #home { display: block; }
  #home.hidden { display: none; }

  .section-title {
    font-family: 'Bangers', cursive;
    font-size: clamp(2rem, 4vw, 2.8rem);
    color: var(--neon-yellow);
    text-shadow: 3px 3px 0 var(--marvel-red);
    text-align: center; letter-spacing: 3px;
    padding: 36px 16px 8px;
  }
  .section-subtitle {
    text-align: center; color: #fff;
    font-size: 1.1rem; font-weight: 800;
    padding-bottom: 28px; letter-spacing: 0.5px;
  }

  .units-grid {
    max-width: 1200px; margin: 0 auto;
    padding: 32px 16px 60px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 22px;
  }

  /* ─── UNIT CARD ─── */
  .unit-card {
    background: var(--card-bg);
    background-size: cover;
    background-position: center;
    border: 3px solid rgba(255,255,255,0.12);
    border-radius: 22px;
    padding: 28px 20px 22px;
    cursor: pointer;
    transition: transform 0.22s, border-color 0.22s, box-shadow 0.22s;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  /* Dark overlay so text is always readable over background images */
  .unit-card::after {
    content: ''; position: absolute; inset: 0; z-index: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.42) 0%, rgba(0,0,0,0.62) 100%);
    border-radius: 20px;
    pointer-events: none;
  }
  .unit-card > * { position: relative; z-index: 1; }
  .unit-card:hover {
    transform: translateY(-8px) scale(1.03);
    box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 0 28px var(--unit-accent, #E23636);
    border-color: var(--unit-accent, #E23636);
  }
  .unit-card .hero-emoji {
    font-size: 4.5rem; line-height: 1;
    filter: drop-shadow(0 0 14px var(--unit-accent, #E23636));
    /* animación bob eliminada */
  }
  @keyframes bob { 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-5px) rotate(2deg)} }
  .unit-number {
    font-family: 'Bangers', cursive;
    font-size: 0.9rem; letter-spacing: 3px;
    color: #fff;
    background: var(--unit-accent, #E23636);
    padding: 3px 14px; border-radius: 20px;
  }
  .unit-title {
    font-family: 'Bangers', cursive;
    font-size: 1.25rem; letter-spacing: 1.5px;
    text-align: center; line-height: 1.25;
    color: #fff;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
    text-transform: uppercase;
  }
  .unit-enter-btn {
    margin-top: 8px;
    background: var(--unit-accent, #E23636);
    color: #fff; border: none;
    font-family: 'Bangers', cursive; font-size: 1.15rem; letter-spacing: 2px;
    padding: 10px 26px; border-radius: 30px; cursor: pointer;
    transition: opacity 0.2s, transform 0.18s;
    box-shadow: 0 5px 16px rgba(0,0,0,0.4);
  }
  .unit-enter-btn:hover { opacity: 0.88; transform: scale(1.07); }

  /* ══════════════════════════════════════
     VISTA INTERIOR DE UNIDAD
  ══════════════════════════════════════ */
  #unit-view { display: none; }
  #unit-view.visible { display: block; }

  .unit-header {
    position: relative; overflow: hidden;
    padding: 50px 24px 38px;
    text-align: center;
    background: linear-gradient(120deg, var(--current-accent, #0D47A1) 0%, color-mix(in srgb, var(--current-accent, #1565C0) 70%, white) 60%, color-mix(in srgb, var(--current-accent, #283593) 55%, black) 100%);
    border-bottom: 5px solid rgba(255,255,255,0.2);
  }
  .unit-header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .unit-header-emoji {
    font-size: 5.5rem; margin-bottom: 12px; display: block;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,0.5));
  }
  .unit-header-number {
    font-family: 'Fredoka One', cursive;
    letter-spacing: 3px; font-size: 0.95rem;
    color: #fff;
    background: rgba(255,255,255,0.18);
    border: 2px solid rgba(255,255,255,0.4);
    padding: 4px 20px; border-radius: 30px;
    display: inline-block; margin-bottom: 12px;
  }
  .unit-header h2 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.8rem, 5vw, 3rem);
    color: #fff;
    text-shadow: 0 3px 10px rgba(0,0,0,0.4);
    letter-spacing: 1.5px; line-height: 1.15;
  }

  /* ── VOLVER ── */
  .back-btn {
    display: block; align-items: center; gap: 8px;
    background: var(--sky-dark); border: none;
    color: #fff;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem; letter-spacing: 1.5px;
    padding: 10px 24px; border-radius: 30px;
    cursor: pointer; transition: all 0.2s;
    margin: 20px auto !important;
    text-align: center;
    box-shadow: var(--shadow-sm);
  }
  .back-btn:hover { background: #015F9A; transform: scale(1.04); }

  /* ══════════════════════════════════════
     CONTENIDO INTERIOR
  ══════════════════════════════════════ */
  .unit-content {
    max-width: 960px; margin: 0 auto;
    padding: 36px 20px 60px;
  }
  .unit-section { margin-bottom: 44px; }

  .unit-section-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem; letter-spacing: 1.5px;
    color: #fff;
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 18px;
    padding: 12px 20px;
    background: linear-gradient(90deg, var(--current-accent, var(--sky-dark)), color-mix(in srgb, var(--current-accent, #0288D1) 70%, white));
    border-radius: 14px;
    box-shadow: var(--shadow-sm);
  }
  .unit-section-title .sec-icon { font-size: 1.5rem; }

  /* EJERCICIOS */
  .ejercicios-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 16px;
  }
  .ejercicio-box {
    background: linear-gradient(135deg, var(--current-accent, #1565C0), color-mix(in srgb, var(--current-accent, #1E88E5) 75%, white));
    border: 3px solid rgba(255,255,255,0.3);
    border-radius: 18px; padding: 24px 14px;
    text-align: center; cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s;
    text-decoration: none; display: block; color: #fff;
    box-shadow: var(--shadow-sm);
  }
  .ejercicio-box:hover {
    transform: scale(1.07);
    box-shadow: 0 8px 28px rgba(21,101,192,0.45);
  }
  .ejercicio-box .ej-num {
    font-family: 'Fredoka One', cursive;
    font-size: 2.6rem; color: #fff;
    text-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  .ejercicio-box .ej-label {
    font-size: 0.95rem; font-weight: 800;
    color: rgba(255,255,255,0.9); margin-top: 4px;
  }
  .ejercicio-box.sin-link { opacity: 0.45; cursor: default; }
  .ejercicio-box.sin-link:hover { transform: none; box-shadow: var(--shadow-sm); }

  /* REPASO */
  .repaso-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }
  .repaso-box {
    background: linear-gradient(135deg, #2E7D32, #43A047);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 12px; padding: 18px 14px;
    text-align: center; cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s;
    text-decoration: none; display: block; color: #fff;
    box-shadow: var(--shadow-sm);
  }
  .repaso-box:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(46,125,50,0.45);
  }
  .repaso-box .rep-label {
    font-family: 'Nunito', sans-serif;
    font-weight: 900; font-size: 1rem; color: #fff;
  }
  .repaso-box.sin-link { opacity: 0.4; cursor: default; }
  .repaso-box.sin-link:hover { transform: none; box-shadow: var(--shadow-sm); }

  /* QUÉ SABEMOS */
  .quesabemos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
    gap: 14px;
  }
  .quesabemos-box {
    background: linear-gradient(135deg, #6A1B9A, #8E24AA);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 30px; padding: 20px 14px;
    text-align: center; cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s;
    text-decoration: none; display: block; color: #fff;
    box-shadow: var(--shadow-sm);
  }
  .quesabemos-box:hover {
    transform: scale(1.06);
    box-shadow: 0 7px 24px rgba(106,27,154,0.45);
  }
  .quesabemos-box .qs-label {
    font-weight: 900; font-size: 1rem; color: #fff;
  }
  .quesabemos-box.sin-link { opacity: 0.4; cursor: default; }
  .quesabemos-box.sin-link:hover { transform: none; box-shadow: var(--shadow-sm); }

  /* DÍA TIC */
  .diatic-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
    gap: 16px;
  }
  .diatic-box {
    border-radius: 18px; padding: 26px 14px;
    text-align: center; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    text-decoration: none; display: block; color: #fff;
    font-weight: 900; font-family: 'Fredoka One', cursive;
    font-size: 1.2rem; letter-spacing: 1px;
    box-shadow: var(--shadow-md);
    border: 3px solid rgba(255,255,255,0.25);
  }
  .diatic-box:hover { transform: scale(1.08); box-shadow: var(--shadow-lg); }
  .diatic-box .tic-icon { font-size: 2.4rem; margin-bottom: 10px; display: block; }
  .diatic-facil   { background: linear-gradient(135deg, #1B5E20, #2E7D32); }
  .diatic-experto { background: linear-gradient(135deg, #0D47A1, #1565C0); }
  .diatic-tic     { background: linear-gradient(135deg, #4A148C, #7B1FA2); }
  .diatic-reto    { background: linear-gradient(135deg, #B71C1C, #C62828); }
  .diatic-leemos  { background: linear-gradient(135deg, #E65100, #F57C00); }
  .diatic-box.sin-link { opacity: 0.45; cursor: default; }
  .diatic-box.sin-link:hover { transform: none; box-shadow: var(--shadow-md); }

  /* ══════════════════════════════════════
     TOAST "PRÓXIMAMENTE"
  ══════════════════════════════════════ */
  .sin-link-msg {
    display: none;
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    background: #0D47A1;
    color: #fff;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem; letter-spacing: 1.5px;
    padding: 14px 32px; border-radius: 30px; z-index: 9999;
    box-shadow: 0 8px 28px rgba(0,0,0,0.3);
    animation: fadeInOut 2.4s ease forwards;
  }
  @keyframes fadeInOut {
    0%  { opacity:0; transform:translateX(-50%) translateY(10px); }
    15% { opacity:1; transform:translateX(-50%) translateY(0); }
    75% { opacity:1; }
    100%{ opacity:0; }
  }

  /* ══════════════════════════════════════
     FOOTER
  ══════════════════════════════════════ */
  footer {
    background: var(--sky-dark);
    border-top: 3px solid rgba(255,255,255,0.15);
    padding: 22px; text-align: center;
    color: rgba(255,255,255,0.85);
    font-size: 0.9rem; font-weight: 700;
  }
  footer span { color: var(--yellow); }

  /* ══════════════════════════════════════
     RESPONSIVE
  ══════════════════════════════════════ */
  @media (max-width: 600px) {
    .units-grid { grid-template-columns: 1fr 1fr; gap: 14px; }
    .unit-card { padding: 18px 12px 16px; }
    .unit-card .hero-emoji { font-size: 3rem; }
    .unit-title { font-size: 0.95rem; }
    .ejercicios-grid, .repaso-grid, .quesabemos-grid, .diatic-grid {
      grid-template-columns: 1fr 1fr;
    }
  }
</style>
</head>

  <div class="header-inner">
    
    <h1>SÚPER CLASE DE 3ºA</h1>

</main>

<footer>

const HOME_BG = "https://espadasymas.com/cdn/shop/articles/imagen_2025-11-27_033238407_7d846772-5c53-445a-b0ed-fae1642debbb.png?v=1764226018";

function setBodyBg(url) {
  if (url) {
    document.body.style.backgroundImage = `url('${url}')`;
    document.body.style.backgroundSize = "cover";
    document.body.style.backgroundAttachment = "fixed";
  } else {
    document.body.style.backgroundImage = "none";
    document.body.style.backgroundSize = "";
    document.body.style.backgroundAttachment = "";
  }
}

// ─── BUILD HOME GRID ───
const grid = document.getElementById('units-grid');
UNITS.forEach(u => {
  const card = document.createElement('div');
  card.className = 'unit-card';
  card.style.setProperty('--unit-accent', u.accent);
  if (u.bg) {
    card.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.55)),url(${u.bg})`;
    card.style.backgroundPosition = u.bgPosition || 'center';
    card.style.backgroundSize = u.bgSize || 'cover';
  }
  card.innerHTML = `
    <div class="hero-emoji">${u.emoji}</div>
    <div class="unit-number">UNIDAD ${u.num}</div>
    <div class="unit-title">${u.title}</div>
    <button class="unit-enter-btn">🚀 ¡JUGAR! 🚀</button>
  `;
  card.addEventListener('click', () => openUnit(u));
  grid.appendChild(card);
});

// ─── HELPER: make a link box or a disabled box ───
function makeLink(href, cls, inner, tag='a') {
  const active = href && href !== '#';
  if (active) {
    return `<a href="${href}" target="_blank" class="${cls}">${inner}</a>`;
  } else {
    return `<div class="${cls} sin-link" onclick="showProximamente()">${inner}</div>`;
  }
}

function showProximamente() {
  const msg = document.getElementById('sinLinkMsg');
  msg.style.display = 'block';
  msg.style.animation = 'none';
  void msg.offsetWidth;
  msg.style.animation = 'fadeInOut 2.4s ease forwards';
  setTimeout(() => { msg.style.display = 'none'; }, 2500);
}

// ─── OPEN UNIT ───
function openUnit(u) {
  document.documentElement.style.setProperty('--current-accent', u.accent);
  document.body.style.backgroundImage = 'none';
  document.body.style.background = '#fff';

  document.getElementById('unit-emoji').textContent = u.emoji;
  document.getElementById('unit-num-label').textContent = `UNIDAD ${u.num}`;
  document.getElementById('unit-title-big').textContent = u.title.toUpperCase();

  const data = LINKS[u.num] || {};

  // EJERCICIOS
  const ejGrid = document.getElementById('ejercicios-grid');
  ejGrid.innerHTML = '';
  for (let i = 1; i <= 4; i++) {
    const link = (data.ejercicios || [])[i-1] || '';
    ejGrid.innerHTML += makeLink(link, 'ejercicio-box',
      `<div class="ej-num">${i}</div><div class="ej-label">Ejercicio ${i}</div>`);
  }

  // REPASO
  const repGrid = document.getElementById('repaso-grid');
  repGrid.innerHTML = '';
  for (let i = 1; i <= 12; i++) {
    const link = (data.repaso || [])[i-1] || '';
    repGrid.innerHTML += makeLink(link, 'repaso-box',
      `<div class="rep-label">Actividad ${i}</div>`);
  }

  // QUÉ SABEMOS
  const qsGrid = document.getElementById('quesabemos-grid');
  qsGrid.innerHTML = '';
  for (let i = 1; i <= 8; i++) {
    const link = (data.quesabemos || [])[i-1] || '';
    qsGrid.innerHTML += makeLink(link, 'quesabemos-box',
      `<div class="qs-label">Actividad ${i}</div>`);
  }

  // DÍA TIC
  const tic = data.diatic || {};
  document.getElementById('diatic-grid').innerHTML = `
    ${makeLink(tic.facil,   'diatic-box diatic-facil',   '<span class="tic-icon">🟢</span>Nivel Fácil')}
    ${makeLink(tic.experto, 'diatic-box diatic-experto', '<span class="tic-icon">🔵</span>Nivel Experto')}
    ${makeLink(tic.tic,     'diatic-box diatic-tic',     '<span class="tic-icon">💻</span>TIC')}
    ${makeLink(tic.reto,    'diatic-box diatic-reto',    '<span class="tic-icon">🏆</span>Reto')}
    ${makeLink(tic.leemos,  'diatic-box diatic-leemos',  '<span class="tic-icon">📖</span>Leemos')}
  `;

  document.getElementById('home').classList.add('hidden');
  document.getElementById('unit-view').classList.add('visible');
  const b=document.querySelector('.nav-btn'); if(b){b.style.display='block';b.style.margin='0 auto';} window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── SHOW HOME ───
function showHome() {
  document.getElementById('unit-view').classList.remove('visible');
  document.getElementById('home').classList.remove('hidden');
  setBodyBg(HOME_BG);
  const b=document.querySelector('.nav-btn'); if(b){b.style.display='block';b.style.margin='0 auto';} window.scrollTo({ top: 0, behavior: 'smooth' });
}
